replicaCount: 1

image:
  repository: cr.yandex/crp5jrq3v9u1b9npu54p/stg-service
  tag: "2026.01.17"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5000

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

env:
  FLASK_APP: "stg_service"
  DEBUG: "False"
  KAFKA_PORT: "9091"
  KAFKA_CONSUMER_GROUP: "stg-service-group"
  KAFKA_SOURCE_TOPIC: "order-service-orders"
  KAFKA_DESTINATION_TOPIC: "stg-service-orders"
  REDIS_PORT: "6380"
  PG_WAREHOUSE_PORT: "6432"

# Secrets should be created separately:
# kubectl create secret generic stg-service-secrets --from-literal=...
secretName: stg-service-secrets

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 5
